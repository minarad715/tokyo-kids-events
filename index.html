<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京こどもイベント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --green:    #2E9E5B;
  --green-lt: #E8F5EE;
  --green-dk: #1A6B3A;
  --orange:   #E07830;
  --orange-lt:#FFF3EA;
  --blue:     #3070D0;
  --blue-lt:  #EDF3FF;
  --purple:   #7A50C8;
  --purple-lt:#F2EEFF;
  --pink:     #D84090;
  --pink-lt:  #FFF0F7;
  --amber:    #C07010;
  --amber-lt: #FFF8E8;
  --red:      #D84040;
  --bg:       #F5F4F0;
  --surface:  #FFFFFF;
  --border:   #E4E0D8;
  --t1:       #1A1A1A;
  --t2:       #555550;
  --t3:       #99998A;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 24px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}

/* ── HEADER ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:0 1.25rem}
.hdr-in{max-width:1080px;margin:0 auto;height:56px;display:flex;align-items:center;gap:1rem}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-mark{width:32px;height:32px;background:var(--green);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.02em;line-height:1.2}
.logo-sub{font-size:10px;color:var(--t3);font-weight:300}
.hdr-search{flex:1;max-width:380px;position:relative}
.hdr-search input{width:100%;padding:7px 12px 7px 34px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit;background:var(--bg);outline:none;transition:border-color .15s;color:var(--t1)}
.hdr-search input:focus{border-color:var(--green);background:#fff}
.hdr-search .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:13px;pointer-events:none}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.upd-time{font-size:11px;color:var(--t3)}
.btn-refresh{padding:6px 14px;border:1px solid var(--green);border-radius:20px;background:none;color:var(--green-dk);font-size:12px;font-family:inherit;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:5px;transition:background .15s;white-space:nowrap}
.btn-refresh:hover{background:var(--green-lt)}
.btn-refresh:disabled{opacity:.5;pointer-events:none}
.spin{display:inline-block;width:12px;height:12px;border:2px solid #cec;border-top-color:var(--green);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LAYOUT ── */
.wrap{max-width:1080px;margin:0 auto;padding:1.25rem;display:grid;grid-template-columns:248px 1fr;gap:1.25rem;align-items:start}
@media(max-width:720px){.wrap{grid-template-columns:1fr}.sidebar{display:none}.hdr-search{display:none}}

/* ── SIDEBAR ── */
.sidebar{display:flex;flex-direction:column;gap:.9rem}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem}
.scard-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.65rem}

/* mini calendar */
.mnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
.mnav-btn{width:26px;height:26px;border:1px solid var(--border);border-radius:50%;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t2);transition:all .15s}
.mnav-btn:hover{background:var(--green-lt);border-color:var(--green);color:var(--green-dk)}
.mnav-label{font-size:14px;font-weight:700}
.mcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;font-size:11px}
.mch{text-align:center;color:var(--t3);padding:2px 0;font-weight:500}
.md{text-align:center;padding:3px 1px;border-radius:4px;cursor:pointer;transition:all .1s;position:relative;line-height:1.7}
.md:hover{background:var(--green-lt);color:var(--green-dk)}
.md.has::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--green);margin:0 auto}
.md.today{background:var(--green);color:#fff;font-weight:700}
.md.today::after{background:rgba(255,255,255,.7)}
.md.sel{background:var(--green-lt);color:var(--green-dk);font-weight:700}
.md.empty{cursor:default;opacity:.3}

/* filters */
.fg{margin-bottom:.85rem}
.fg-label{font-size:11px;color:var(--t3);font-weight:500;margin-bottom:.3rem}
.ftags{display:flex;flex-wrap:wrap;gap:4px}
.chip{padding:3px 9px;border-radius:20px;font-size:11px;border:1px solid var(--border);background:none;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .13s;font-weight:500;line-height:1.6}
.chip:hover{border-color:var(--t2);color:var(--t1)}
.chip.on-cost{background:var(--green-lt);border-color:var(--green);color:var(--green-dk)}
.chip.on-age{background:var(--orange-lt);border-color:var(--orange);color:var(--orange)}
.chip.on-cat{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.chip.on-area{background:var(--purple-lt);border-color:var(--purple);color:var(--purple)}
.clear-btn{font-size:11px;color:var(--t3);border:none;background:none;cursor:pointer;padding:2px 0;font-family:inherit}
.clear-btn:hover{color:var(--red)}

/* sources */
.src-list{display:flex;flex-direction:column;gap:3px}
.src-item{display:flex;align-items:center;gap:7px;font-size:12px;padding:4px 5px;border-radius:6px;transition:background .1s;color:var(--t2)}
.src-item:hover{background:var(--bg);color:var(--t1)}
.src-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.src-name{flex:1}
.src-cnt{font-size:10px;color:var(--t3);background:var(--bg);padding:0 5px;border-radius:8px}

/* scraper status */
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.sc-item{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 7px;border-radius:5px;background:var(--bg)}
.sc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sc-dot.ok{background:var(--green)}.sc-dot.wait{background:var(--amber)}.sc-dot.err{background:var(--red)}
.sc-n{flex:1;color:var(--t2)}.sc-v{font-weight:700;font-size:10px}

/* ── CONTENT ── */
.content{display:flex;flex-direction:column;gap:1.1rem}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:.75rem 1rem}
.stat-n{font-size:22px;font-weight:700;line-height:1;margin-bottom:2px}
.stat-l{font-size:11px;color:var(--t3)}
.stat.g .stat-n{color:var(--green-dk)}
.stat.o .stat-n{color:var(--orange)}
.stat.b .stat-n{color:var(--blue)}
.stat.p .stat-n{color:var(--purple)}

/* toolbar */
.toolbar{display:flex;align-items:center;gap:8px}
.vtoggle{display:flex;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden}
.vbtn{padding:5px 11px;font-size:12px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--t2);transition:all .13s}
.vbtn.on{background:var(--t1);color:#fff}
.sort-sel{margin-left:auto;padding:5px 9px;border:1px solid var(--border);border-radius:var(--r-md);font-size:12px;font-family:inherit;background:var(--surface);color:var(--t1);cursor:pointer;outline:none}

/* ── CALENDAR ── */
.cal{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-hd{text-align:center;padding:8px;font-size:11px;font-weight:700;color:var(--t3)}
.cal-hd:first-child{color:var(--red)}.cal-hd:last-child{color:var(--blue)}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr)}
.cc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:88px;padding:5px;cursor:pointer;transition:background .1s}
.cc:nth-child(7n){border-right:none}
.cc:hover{background:var(--bg)}
.cc.empty{background:var(--bg);opacity:.45;cursor:default}
.cc.today{background:var(--green-lt)}
.cc.sel{background:#E0F0E8}
.cn{font-size:12px;font-weight:500;margin-bottom:3px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.cc.today .cn{background:var(--green);color:#fff;font-weight:700}
.cpill{font-size:9.5px;padding:1px 5px;border-radius:3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;line-height:1.55}
.cpill:hover{opacity:.75}
.cmore{font-size:9.5px;color:var(--t3);padding:0 3px}

/* ── LIST ── */
.elist{display:flex;flex-direction:column;gap:8px}
.ec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:1rem 1.1rem;display:flex;gap:.9rem;align-items:flex-start;transition:all .15s;position:relative;color:var(--t1)}
.ec:hover{border-color:var(--green);transform:translateY(-1px);box-shadow:0 2px 10px rgba(46,158,91,.1)}
.ec.free-ev{border-left:3px solid var(--green)}
.edc{min-width:48px;text-align:center;background:var(--bg);border-radius:var(--r-md);padding:7px 5px;flex-shrink:0}
.edm{font-size:10px;color:var(--t3)}
.edd{font-size:24px;font-weight:700;line-height:1;color:var(--t1)}
.edw{font-size:10px;color:var(--t3);margin-top:1px}
.eb{flex:1;min-width:0}
.et{font-size:14px;font-weight:700;margin-bottom:4px;line-height:1.4}
.em{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:5px;font-size:12px;color:var(--t2)}
.edesc{font-size:12px;color:var(--t2);margin-bottom:7px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.etags{display:flex;flex-wrap:wrap;gap:3px}
.etag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.t-free{background:var(--green-lt);color:var(--green-dk);border:1px solid #b8ddc8}
.t-paid{background:var(--blue-lt);color:var(--blue);border:1px solid #b8cef0}
.t-concert{background:var(--purple-lt);color:var(--purple);border:1px solid #ccc0f0}
.t-outdoor,.t-nature,.t-festival{background:var(--green-lt);color:var(--green-dk);border:1px solid #b8ddc8}
.t-indoor,.t-museum,.t-workshop{background:#f0f0f0;color:#505050;border:1px solid #d8d8d8}
.t-stage{background:var(--pink-lt);color:var(--pink);border:1px solid #f0b8d8}
.t-sport{background:var(--orange-lt);color:var(--orange);border:1px solid #f0ccaa}
.t-baby,.t-toddler{background:var(--pink-lt);color:var(--pink);border:1px solid #f0b8d8}
.t-preschool{background:var(--orange-lt);color:var(--orange);border:1px solid #f0ccaa}
.t-elementary{background:var(--blue-lt);color:var(--blue);border:1px solid #b8cef0}
.t-family{background:var(--purple-lt);color:var(--purple);border:1px solid #ccc0f0}
.src-badge{position:absolute;top:9px;right:11px;font-size:9px;color:var(--t3);background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:1px 6px}

/* states */
.loading-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:3rem;text-align:center;color:var(--t3)}
.loading-state .big-spin{width:32px;height:32px;border:3px solid #ddd;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.empty-state{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:3rem;text-align:center;color:var(--t3)}
.empty-icon{font-size:32px;margin-bottom:10px}


.affili-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:.9rem;overflow:hidden}
.affili-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.75rem}
.affili-banner{display:block;margin-bottom:8px;text-align:center}
.affili-banner img{max-width:100%;height:60px;object-fit:contain;border-radius:var(--r-sm)}
.affili-btn{display:block;text-align:center;padding:7px 12px;border-radius:20px;font-size:12px;font-weight:500;margin-bottom:6px;text-decoration:none;transition:opacity .15s}
.affili-btn:hover{opacity:.8}
.affili-btn.amazon{background:#FF9900;color:#111}
.affili-btn.rakuten{background:#BF0000;color:#fff}
.affili-sep{border:none;border-top:1px solid var(--border);margin:8px 0}
.event-affili{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}
.ev-affili-btn{font-size:10px;padding:3px 9px;border-radius:20px;text-decoration:none;font-weight:500;transition:opacity .15s}
.ev-affili-btn:hover{opacity:.8}
.ev-affili-btn.amz{background:#FF9900;color:#111}
.ev-affili-btn.rak{background:#BF0000;color:#fff}


.affili-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
.affili-bar a{flex:1;min-width:140px;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px 10px;border-radius:22px;font-size:13px;font-weight:700;text-decoration:none;transition:opacity .15s}
.affili-bar a:hover{opacity:.85}
.affili-bar .amz{background:#FF9900;color:#111}
.affili-bar .rak{background:#BF0000;color:#fff}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:#222;color:#fff;padding:9px 16px;border-radius:var(--r-md);font-size:13px;z-index:9999;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>

          <button class="chip" data-f="cat" data-v="nature"   onclick="tog(this)">自然・動物</button>

          <button class="chip" data-f="area" data-v="other"     onclick="tog(this)">その他</button>

  {id:37, title:'サンシャイン60展望台 春の特別イベント',            date:'2026-02-26', endDate:'2026-05-10', source:'ikoy',   place:'豊島区・サンシャイン60展望台 てんぼうパーク',area:'other',  cost:'paid',  ages:['preschool','elementary','family'],         cats:['festival'],          desc:'展望台からの桜・春景色を楽しむ特別イベント期間。限定グッズ販売やフォトスポットも。',             url:'https://iko-yo.net/'},
];

// ── STATE ──
let EVENTS = [...SAMPLE];
let vYear = 2026, vMonth = 2;
let F = {cost:[],age:[],cat:[],area:[]};
let curV = 'cal';
let selDay = null;
const TODAY = new Date();
const WD = ['日','月','火','水','木','金','土'];
const AGE_L = {baby:'0〜1歳',toddler:'2〜3歳',preschool:'4〜6歳',elementary:'小学生',family:'家族'};
const CAT_L = {concert:'コンサート',museum:'展示',workshop:'体験',nature:'自然',sport:'スポーツ',stage:'舞台',festival:'お祭り'};
const CAT_C = {
  concert:  {bg:'#F2EEFF',tx:'#6D28D9'},
  museum:   {bg:'#EDF3FF',tx:'#1D4ED8'},
  workshop: {bg:'#FFF3EA',tx:'#C05610'},
  nature:   {bg:'#E8F5EE',tx:'#1A6B3A'},
  sport:    {bg:'#EDF3FF',tx:'#1D4ED8'},
  stage:    {bg:'#FFF0F7',tx:'#BE185D'},
  festival: {bg:'#FFF8E8',tx:'#854F0B'},
};

// ── LOAD events.json ──
async function loadEvents(manual=false) {
  const btn = document.getElementById('rfbtn');
  const icon = document.getElementById('rficon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spin"></span>';
  try {
    const r = await fetch('events.json?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const data = await r.json();
    if (data.events && data.events.length > 0) {
      const scraped = data.events.filter(e => {
        if (!e.date || !e.title || e.title.length < 4) return false;
        const dateObj = new Date(e.date);
        if (isNaN(d.getTime())) return false;
        const garbage = ['期間を選択する','カテゴリを選択する','対象年齢','開催エリア'];
        if (garbage.includes(e.title)) return false;
        return true;
      });
      const scrapedTitles = new Set(scraped.map(e => e.title.slice(0,10)));
      const sampleOnly = SAMPLE.filter(e => !scrapedTitles.has(e.title.slice(0,10)));
      EVENTS = [...scraped, ...sampleOnly];
      const d = new Date(data.updated);
      const d = new Date(data.updated);
      document.getElementById('upd-time').textContent =
        `更新: ${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      if (manual) toast(`✓ ${EVENTS.length}件のイベントを取得しました`);
    } else {
      EVENTS = [...SAMPLE];
      if (manual) toast('サンプルデータを表示しています（本番はGitHub Actionsが自動更新）');
    }
  } catch {
    EVENTS = [...SAMPLE];
    document.getElementById('upd-time').textContent = 'サンプルデータ表示中';
  }
  btn.disabled = false;
  icon.textContent = '↻';
  renderAll();
}

function renderAll() {
  renderMiniCal();
  renderSources();
  renderScrapers();
  updateStats();
  render();
}

// ── MONTH NAV ──
function chMonth(d) {
  vMonth += d;
  if (vMonth > 11){vMonth=0;vYear++;}
  if (vMonth < 0){vMonth=11;vYear--;}
  document.getElementById('mnav-lbl').textContent = `${vYear}年${vMonth+1}月`;
  selDay = null;
  renderAll();
}

// ── FILTER ──
function tog(btn) {
  const f = btn.dataset.f, v = btn.dataset.v;
  const arr = F[f], i = arr.indexOf(v);
  const cls = 'on-' + f;
  if (i >= 0){arr.splice(i,1);btn.classList.remove(cls);}
  else{arr.push(v);btn.classList.add(cls);}
  render();
}
function clearF() {
  F = {cost:[],age:[],cat:[],area:[]};
  document.querySelectorAll('.chip').forEach(b => b.className = 'chip');
  document.getElementById('q').value = '';
  selDay = null;
  render();
  renderMiniCal();
}
function filtered() {
  const q = (document.getElementById('q')?.value||'').trim().toLowerCase();
  const sort = document.getElementById('sort-sel')?.value || 'date';
  const ms = new Date(vYear, vMonth, 1), me = new Date(vYear, vMonth+1, 0);
  let evs = EVENTS.filter(e => {
    const s = new Date(e.date), en = new Date(e.endDate);
    if (s > me || en < ms) return false;
    if (F.cost.length && !F.cost.includes(e.cost)) return false;
    if (F.age.length  && !F.age.some(a => e.ages.includes(a))) return false;
    if (F.cat.length  && !F.cat.some(c => e.cats.includes(c))) return false;
    if (F.area.length && !F.area.includes(e.area)) return false;
    if (q && !e.title.toLowerCase().includes(q) && !e.place.toLowerCase().includes(q)) return false;
    if (selDay) {
      const d = new Date(vYear, vMonth, selDay);
      if (d < s || d > en) return false;
    }
    return true;
  });
  if (sort === 'free') evs.sort((a,b) => (a.cost==='free'?0:1)-(b.cost==='free'?0:1));
  else evs.sort((a,b) => a.date.localeCompare(b.date));
  return evs;
}

// ── RENDER ──
function render() {
  const evs = filtered();
  if (curV === 'cal') renderCal(evs); else renderList(evs);
  renderMiniCal();
}

// ── MINI CAL ──
function renderMiniCal() {
  const fd = new Date(vYear, vMonth, 1).getDay();
  const dm = new Date(vYear, vMonth+1, 0).getDate();
  const hasDays = new Set();
  EVENTS.forEach(e => {
    const s = new Date(Math.max(+new Date(e.date), +new Date(vYear,vMonth,1)));
    const en = new Date(Math.min(+new Date(e.endDate), +new Date(vYear,vMonth+1,0)));
    for(let d=new Date(s); d<=en; d.setDate(d.getDate()+1)) hasDays.add(d.getDate());
  });
  let h = ['日','月','火','水','木','金','土'].map(d=>`<div class="mch">${d}</div>`).join('');
  for(let i=0;i<fd;i++) h+=`<div class="md empty"></div>`;
  for(let d=1;d<=dm;d++){
    const isTd = TODAY.getFullYear()===vYear && TODAY.getMonth()===vMonth && TODAY.getDate()===d;
    const isSel = selDay===d;
    const cls = [isTd?'today':'', isSel?'sel':'', hasDays.has(d)?'has':''].filter(Boolean).join(' ');
    h += `<div class="md ${cls}" onclick="selD(${d})">${d}</div>`;
  }
  document.getElementById('mcal').innerHTML = `<div class="mcal-grid">${h}</div>`;
}
function selD(d){
  selDay = selDay===d?null:d;
  render();
  if(selDay){ setV('lst'); document.getElementById('lst-view').scrollIntoView({behavior:'smooth'}); }
}

// ── CALENDAR VIEW ──
function renderCal(evs) {
  const fd = new Date(vYear, vMonth, 1).getDay();
  const dm = new Date(vYear, vMonth+1, 0).getDate();
  let h = `<div class="cal"><div class="cal-head">${['日','月','火','水','木','金','土'].map(d=>`<div class="cal-hd">${d}</div>`).join('')}</div><div class="cal-body">`;
  for(let i=0;i<fd;i++) h+=`<div class="cc empty"></div>`;
  for(let d=1;d<=dm;d++){
    const isTd = TODAY.getFullYear()===vYear && TODAY.getMonth()===vMonth && TODAY.getDate()===d;
    const isSel = selDay===d;
    const day = new Date(vYear, vMonth, d);
    const de = evs.filter(e => day>=new Date(e.date) && day<=new Date(e.endDate));
    let pills = de.slice(0,3).map(e => {
      const c = CAT_C[e.cats[0]] || CAT_C.festival;
      return `<span class="cpill" style="background:${c.bg};color:${c.tx}" title="${e.title}">${e.cost==='free'?'★ ':''}${e.title.slice(0,8)}…</span>`;
    }).join('');
    if(de.length>3) pills+=`<div class="cmore">+${de.length-3}件</div>`;
    h += `<div class="cc${isTd?' today':''}${isSel?' sel':''}" onclick="selD(${d})"><div class="cn">${d}</div>${pills}</div>`;
  }
  h += `</div></div>`;
  document.getElementById('cal-view').innerHTML = h;
}

// ── LIST VIEW ──
function renderList(evs) {
  if(!evs.length){
    document.getElementById('lst-view').innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><p>該当するイベントが見つかりませんでした</p></div>`;
    return;
  }
  const srcMap = Object.fromEntries(SOURCES.map(s=>[s.id,s]));
  document.getElementById('lst-view').innerHTML = `<div class="elist">${evs.map(e=>{
    const d = new Date(e.date), ed = new Date(e.endDate);
    const multi = e.date !== e.endDate;
    const aTags = e.ages.map(a=>`<span class="etag t-${a}">${AGE_L[a]||a}</span>`).join('');
    const cTags = e.cats.map(c=>`<span class="etag t-${c}">${CAT_L[c]||c}</span>`).join('');
    const costTag = `<span class="etag t-${e.cost}">${e.cost==='free'?'★ 無料':'有料'}</span>`;
    const isOutdoor = e.cats.some(c=>['nature','festival','sport'].includes(c));
    const affiliHtml = isOutdoor ? `<div class="event-affili"><a class="ev-affili-btn amz" href="https://amzn.to/4drmgiB" target="_blank" rel="nofollow noopener">🛒 レジャーシート</a><a class="ev-affili-btn rak" href="https://room.rakuten.co.jp/minami123/items" target="_blank" rel="nofollow noopener">🛍 楽天ルームで教員オススメ知育グッズ</a></div>` : '';
    const src = srcMap[e.source];
    const eventUrl = e.url && e.url !== '#' ? e.url : (src?.url || '#');
    return `<a class="ec${e.cost==='free'?' free-ev':''}" href="${eventUrl}" target="_blank" rel="noopener nofollow">
      <span class="src-badge">${src?.name||e.source} ↗</span>
      <div class="edc"><div class="edm">${d.getMonth()+1}月</div><div class="edd">${d.getDate()}</div><div class="edw">${WD[d.getDay()]}${multi?'〜':''}</div></div>
      <div class="eb">
        <div class="et">${e.title}</div>
        <div class="em">📍 ${e.place}${multi?` &nbsp;📅 ${d.getMonth()+1}/${d.getDate()}〜${ed.getMonth()+1}/${ed.getDate()}`:''}</div>
        <div class="edesc">${e.desc}</div>
        <div class="etags">${costTag}${aTags}${cTags}</div>${affiliHtml}
      </div>
    </a>`;
  }).join('')}</div>`;
}

// ── STATS ──
function updateStats() {
  const ms = new Date(vYear,vMonth,1), me = new Date(vYear,vMonth+1,0);
  const mEvs = EVENTS.filter(e=>new Date(e.date)<=me && new Date(e.endDate)>=ms);
  document.getElementById('s-total').textContent = mEvs.length;
  document.getElementById('s-free').textContent  = mEvs.filter(e=>e.cost==='free').length;
  const dw = TODAY.getDay(), sat = new Date(TODAY); sat.setDate(TODAY.getDate()+(6-dw+7)%7);
  const sun = new Date(sat); sun.setDate(sat.getDate()+1);
  document.getElementById('s-wknd').textContent  = mEvs.filter(e=>new Date(e.date)<=sun&&new Date(e.endDate)>=sat).length;
  document.getElementById('s-src').textContent   = SOURCES.length;
}

// ── SOURCES ──
function renderSources() {
  const cnt = {};
  EVENTS.forEach(e => cnt[e.source]=(cnt[e.source]||0)+1);
  document.getElementById('src-list').innerHTML = SOURCES.map(s=>
    `<a class="src-item" href="${s.url}" target="_blank" rel="noopener">
      <span class="src-dot" style="background:${s.color}"></span>
      <span class="src-name">${s.name}</span>
      <span class="src-cnt">${cnt[s.id]||0}</span>
    </a>`
  ).join('');
}

// ── SCRAPER STATUS ──
function renderScrapers() {
  const items = [
    {n:'いこーよ',      s:'ok',   v:'取得済'},
    {n:'東京都公式',     s:'ok',   v:'取得済'},
    {n:'コンサートSQ',  s:'ok',   v:'取得済'},
    {n:'ウォーカー+',   s:'ok',   v:'取得済'},
    {n:'キッズイベント', s:'ok',   v:'取得済'},
    {n:'レッツエンジョイ',s:'ok',  v:'取得済'},
    {n:'るるぶ',        s:'ok',   v:'取得済'},
    {n:'次回実行',       s:'wait', v:'明日 9:00'},
  ];
  document.getElementById('sc-grid').innerHTML = items.map(i=>
    `<div class="sc-item"><span class="sc-dot ${i.s}"></span><span class="sc-n">${i.n}</span><span class="sc-v">${i.v}</span></div>`
  ).join('');
}

// ── VIEW TOGGLE ──
function setV(v) {
  curV = v;
  document.getElementById('cal-view').style.display = v==='cal'?'':'none';
  document.getElementById('lst-view').style.display = v==='lst'?'':'none';
  document.getElementById('vbtn-cal').className = 'vbtn'+(v==='cal'?' on':'');
  document.getElementById('vbtn-lst').className = 'vbtn'+(v==='lst'?' on':'');
  render();
}

// ── UTILS ──
function pad(n){return String(n).padStart(2,'0')}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}

// ── START ──
loadEvents();
</script>
